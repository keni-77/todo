<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>やることリスト</title>
<style>
:root{
  --bg:#f6f8fb;
  --card:#ffffff;
  --muted:#6b7280;
  --accent:#2563eb;
  --accent-strong:#1e40af;
  --danger:#dc2626;
  --shadow: 0 10px 30px rgba(15,23,42,0.08);
  --radius:14px;
  --maxw:1100px;
  --gap:10px;
  --font-base:15px;
  --small-font:10px;
}

/* base */
*{box-sizing:border-box}
html,body{height:100%}
body{
  font-family: sans-serif;
  background: linear-gradient(180deg,#eef4ff 0%, #f6f8fb 100%);
  margin:0;
  padding:28px;
  color:#0f172a;
  -webkit-font-smoothing:antialiased;
  font-size:var(--font-base);
  line-height:1.45;
  transition: background 0.5s ease;
}

body.birthday-mode { background: linear-gradient(180deg,#ffeef8 0%, #fff6fb 100%); }

.app{max-width:var(--maxw);margin:0 auto}
.app-header{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.app-header h1{margin:0;font-size:28px;font-weight:800}
.header-sub{color:var(--muted);font-size:var(--small-font)}

/* 誕生日バナー */
.birthday-banner {
  background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
  color: #c026d3;
  padding: 16px; border-radius: 14px; text-align: center;
  font-weight: 800; font-size: 20px; margin-bottom: 20px;
  box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
  animation: bounce 1s infinite alternate;
}
@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-5px); }
}

/* 期限間近の警告アニメーション */
@keyframes warningPulse {
  0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); border-color: #fca5a5; }
  70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); border-color: #ef4444; }
  100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); border-color: #fca5a5; }
}
.warning-pulse {
  animation: warningPulse 1.5s infinite;
  background: linear-gradient(180deg,#fff,#fff5f5) !important;
}

/* tabs */
.tabs{display:flex;gap:12px;margin-bottom:20px}
.tab{
  padding:12px 18px;border-radius:12px;border:1px solid rgba(15,23,42,0.06);
  background:transparent;cursor:pointer;font-weight:700;color:#1f2937;font-size:16px;
  transition:all .12s ease;
}
.tab.active{background:var(--accent);color:#fff;box-shadow:var(--shadow);transform:translateY(-2px)}
body.birthday-mode .tab.active{background:#ec4899; box-shadow: 0 10px 30px rgba(236,72,153,0.2);}

/* card */
.card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:18px}

/* buttons */
.btn{padding:10px 14px;border-radius:10px;border:1px solid rgba(15,23,42,0.06);background:#fff;cursor:pointer;font-weight:700;font-size:15px}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
body.birthday-mode .btn.primary{background:#ec4899;border-color:#ec4899}
.btn.danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn:active{transform:translateY(1px)}

/* tools row */
.tools-row{display:flex;justify-content:space-between;align-items:center;margin:12px 0}
.today-info{color:var(--muted);font-size:var(--small-font)}

/* lists */
.section-title{margin:10px 0 12px 0;font-size:20px;font-weight:800}
.list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

/* task card */
.task-card{
  background:linear-gradient(180deg,#fff,#fbfdff);
  border-radius:14px;padding:16px;box-shadow:0 6px 18px rgba(16,24,40,0.06);
  display:flex;flex-direction:column;gap:10px;border:1px solid #eef6ff;
  transition: all 0.3s ease;
}
.task-top{display:flex;align-items:center;gap:12px}
.task-title{font-weight:800;font-size:18px}
.task-meta{color:var(--muted);font-size:15px;margin-left:auto;text-align:right}
.task-memo{color:#475569;font-size:15px}
.task-card.birthday-task { background: #fff0f6; border-color: #fce7f3; }

input[type="checkbox"]{ width:22px;height:22px;cursor:pointer;transform:scale(1.25); accent-color: var(--accent-strong); }
body.birthday-mode input[type="checkbox"]{ accent-color: #ec4899; }

.task-actions{display:flex;gap:10px;align-items:center}
.task-actions button{padding:8px 12px;border-radius:10px;font-weight:700}

/* hidden */
.hidden-area{margin-top:14px;padding:14px;border-radius:12px;background:linear-gradient(180deg,#fbfbfb,#f7f7f8);border:1px solid #eee}
.hidden-task{opacity:0.9;color:#7b8188;background:transparent;border:1px dashed rgba(139,143,152,0.06)}

/* edit list */
.edit-list{display:flex;flex-direction:column;gap:12px}
.edit-row{display:flex;gap:10px;align-items:center;padding:12px;border-radius:12px;background:linear-gradient(180deg,#fff,#fcfdff);border:1px solid #eef6ff;flex-wrap:wrap}
.edit-row input[type="text"], .edit-row input[type="date"], .edit-row input[type="time"], .edit-row select{padding:10px;border-radius:10px;border:1px solid #e6e9ef;background:#fff;font-size:15px}
.edit-actions{margin-left:auto;display:flex;gap:10px}
.example { color: #9aa0a6; font-size:14px; margin-left:8px; white-space:nowrap; }

.edit-group-title {
  margin: 24px 0 4px 0; font-size: 16px; font-weight: 800; color: var(--accent-strong);
  border-bottom: 2px solid #eef6ff; padding-bottom: 6px;
}
.edit-group-title:first-child { margin-top: 0; }

input:focus, select:focus, button:focus {
  outline: 3px solid rgba(37,99,235,0.18); outline-offset: 2px;
}

.adv-time-box {
  display: flex; gap: 8px; align-items: center; background: #f8fafc; padding: 8px; border-radius: 8px; font-size: 14px;
}

.warning-badge {
  background: #ef4444; color: #fff; padding: 2px 6px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-bottom: 4px; display: inline-block;
}

.app-footer{margin-top:20px;color:var(--muted);font-size:14px;text-align:center}
@media (max-width:900px){
  .list-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
  .task-title{font-size:16px}
  .task-meta{font-size:13px}
}
</style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>やることリスト</h1>
      <div class="header-sub">シンプルな表示。編集は専用モードで行います。</div>
    </header>

    <div id="birthdayBanner" class="birthday-banner" style="display:none;"></div>

    <nav class="tabs">
      <button id="displayTab" class="tab active">表示モード</button>
      <button id="editTab" class="tab">編集モード</button>
    </nav>

    <main id="displayArea" class="area">
      <section class="card">
        <div class="tools-row">
          <div class="today-info">今日: <span id="todayLabel"></span></div>
        </div>
        <h2 class="section-title">今日のタスク・課題</h2>
        <div id="taskList" class="list-grid"></div>
        <div class="hidden-toggle" style="margin-top: 16px;">
          <button id="toggleHidden" class="btn">- 非表示 -</button>
        </div>
        <div id="hiddenArea" class="hidden-area" style="display:none;">
          <h3>完了したタスク</h3>
          <div id="hiddenList" class="list-grid"></div>
        </div>
      </section>
    </main>

    <main id="editArea" class="area" style="display:none;">
      <section class="card edit-card">
        <div class="edit-tools" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom: 16px;">
          <button id="newDraftBtn" class="btn primary">新規追加（下書き）</button>
          <button id="deleteAll" class="btn danger">全削除</button>
          <button id="exportBtn" class="btn">データをコピー</button>
          <button id="importBtn" class="btn">データを読み込み</button>
          <div style="font-size: 13px; color: var(--muted); width: 100%;">追加は「新規追加」で空の下書きを作り、それを編集して保存してください。下書きは表示モードに出ません。</div>
        </div>
        
        <h2 class="section-title">全タスク・課題（編集）</h2>
        <div id="editList" class="edit-list"></div>
      </section>
    </main>

    <footer class="app-footer">
      <small>localStorage に保存されます。下書きは表示モードに反映されません。</small>
    </footer>
  </div>

<script>
const STORAGE_KEY = "tasks_simple_edit_v2";
let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let saveTimer = null;
const SAVE_DEBOUNCE_MS = 300;

// データ構造のマイグレーション（古いバージョンからの引き継ぎ対応）
tasks = tasks.map(t => {
  if(t.type === "deadline_weekly" && t.startWd === undefined) {
    return {...t, startWd: 1, startTime: "08:00", endWd: 5, endTime: "23:59"}; // デフォルト: 月曜8時〜金曜23時59分
  }
  if(t.type === "deadline_once" && t.endTime === undefined) {
    return {...t, endTime: "23:59"};
  }
  return t;
});

const displayTab = document.getElementById("displayTab");
const editTab = document.getElementById("editTab");
const displayArea = document.getElementById("displayArea");
const editArea = document.getElementById("editArea");
const todayLabel = document.getElementById("todayLabel");
const birthdayBanner = document.getElementById("birthdayBanner");
todayLabel.textContent = new Date().toLocaleDateString("ja-JP");

function toLocalDateString(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function todayISO(){ return toLocalDateString(new Date()); }

function saveDebounced(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(()=> {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    saveTimer = null;
  }, SAVE_DEBOUNCE_MS);
}
function weekdayName(n){ return ["日","月","火","水","木","金","土"][n] || ""; }
function formatMonthDay(iso){ if(!iso) return ""; const d = new Date(iso); return `${d.getMonth()+1}月${d.getDate()}日`; }
function escapeHtml(s){ if(!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }

// 指定した曜日と時間の直近の過去日時を取得する（復活日時の判定用）
function getMostRecentPastDayOfWeekTime(now, targetWd, targetTime) {
  const [h, m] = targetTime.split(':').map(Number);
  let d = new Date(now);
  d.setHours(h, m, 0, 0);
  let diff = d.getDay() - targetWd;
  if (diff < 0) diff += 7;
  d.setDate(d.getDate() - diff);
  if (d > now) {
    d.setDate(d.getDate() - 7);
  }
  return d;
}

// 指定した曜日と時間の直近の未来日時を取得する（期限日時の判定用）
function getNextDayOfWeekTime(now, targetWd, targetTime) {
  const [h, m] = targetTime.split(':').map(Number);
  let d = new Date(now);
  d.setHours(h, m, 0, 0);
  let diff = targetWd - d.getDay();
  if (diff < 0) diff += 7;
  d.setDate(d.getDate() + diff);
  if (d < now) {
    d.setDate(d.getDate() + 7);
  }
  return d;
}

let currentMode = "display";
function switchMode(mode){
  currentMode = mode;
  if(mode === "display"){
    displayArea.style.display = ""; editArea.style.display = "none";
    displayTab.classList.add("active"); editTab.classList.remove("active");
    cleanupExpiredDates(); resetDailyChecks(); render();
  } else {
    displayArea.style.display = "none"; editArea.style.display = "";
    displayTab.classList.remove("active"); editTab.classList.add("active");
    renderEdit();
  }
}
displayTab.addEventListener("click", ()=> switchMode("display"));
editTab.addEventListener("click", ()=> switchMode("edit"));

window.addEventListener("load", () => { cleanupExpiredDates(); resetDailyChecks(); render(); });
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible"){
    cleanupExpiredDates(); resetDailyChecks();
    if(currentMode === "display") render(); else renderEdit();
  }
});

// 1分ごとに画面を更新して期限の色や1時間前警告を動的に反映
setInterval(() => {
  if(currentMode === "display") {
    resetDailyChecks(); // 時間経過で復活するものがあるかチェック
    render();
  }
}, 60000);

function cleanupExpiredDates(){
  const today = todayISO();
  const now = new Date();
  const before = tasks.length;
  tasks = tasks.filter(t => {
    if(t.type === "once" && t.date && t.date < today) return false;
    if(t.type === "deadline_once" && t.isDone && t.date) {
      const [h, m] = (t.endTime || "23:59").split(':').map(Number);
      const limit = new Date(t.date); limit.setHours(h, m, 0, 0);
      if(limit < now) return false;
    }
    return true;
  });
  if(tasks.length !== before) saveDebounced();
}

function resetDailyChecks(){
  const today = todayISO();
  const now = new Date();
  let changed = false;
  tasks.forEach(t => {
    if(t.isDone) {
      if(t.type === "daily" || t.type === "weekly" || t.everyday) {
        if(t.lastDoneDate !== today){ t.isDone = false; changed = true; }
      } 
      else if(t.type === "deadline_weekly") {
        // 最後に完了した日時（lastDoneTime）が、直近の「復活日時」より古ければ復活させる
        if(t.startWd !== undefined && t.startTime !== undefined) {
          const recentReset = getMostRecentPastDayOfWeekTime(now, Number(t.startWd), t.startTime);
          if(t.lastDoneTime && t.lastDoneTime < recentReset.getTime()) {
             t.isDone = false; changed = true; 
          }
        }
      }
    }
  });
  if(changed) saveDebounced();
}

function getDeadlineInfo(task, now) {
  let deadlineDate = null;
  
  if (task.type === "deadline_weekly") {
    deadlineDate = getNextDayOfWeekTime(now, Number(task.endWd), task.endTime || "23:59");
    // もし現在時刻が、直近の復活日時より前なら、まだ表示期間ではない
    const recentReset = getMostRecentPastDayOfWeekTime(now, Number(task.startWd), task.startTime || "00:00");
    // ※ただし、次の期限が先週の復活分というケースもあるため、厳密には「復活日時〜期限日時」の間にあるかチェック
    if (deadlineDate.getTime() - recentReset.getTime() > 7 * 24 * 60 * 60 * 1000) {
      // 復活日時より前に期限が来ている場合は表示期間外の可能性があるが、シンプルに次の期限を基準とする
    }
  } else if (task.type === "deadline_once" && task.date) {
    deadlineDate = new Date(task.date);
    const [h, m] = (task.endTime || "23:59").split(':').map(Number);
    deadlineDate.setHours(h, m, 0, 0);
  }

  if (!deadlineDate) return { color: "#ea580c", text: "", isWarning: false };

  const timeLeft = deadlineDate.getTime() - now.getTime();
  const ONE_HOUR = 60 * 60 * 1000;
  const ONE_DAY = 24 * ONE_HOUR;

  let isWarning = false;
  let color = "#ea580c"; // デフォルトのオレンジ (Hue: 約24)
  let text = "";

  if (timeLeft < 0) {
    color = "#dc2626"; // 期限切れ・赤
    text = "期限切れ";
    isWarning = true;
  } else if (timeLeft <= ONE_DAY) {
    // 24時間以内：オレンジ(Hue 25) から 赤(Hue 0) へグラデーション
    const hue = Math.max(0, Math.min(25, (timeLeft / ONE_DAY) * 25));
    color = `hsl(${hue}, 90%, 50%)`;
    
    if (timeLeft <= ONE_HOUR) {
      isWarning = true; // 1時間切ったら警告
      const m = Math.floor(timeLeft / 60000);
      text = `残り ${m} 分！`;
    } else {
      const h = Math.floor(timeLeft / ONE_HOUR);
      text = `残り約 ${h} 時間`;
    }
  }

  return { color, text, isWarning, deadlineDate };
}

function render(){
  const taskList = document.getElementById("taskList");
  const hiddenList = document.getElementById("hiddenList");
  taskList.innerHTML = ""; hiddenList.innerHTML = "";

  const now = new Date();
  const todayStr = todayISO(); 
  const wd = now.getDay();
  let birthdayNames = [];

  tasks.forEach(task => {
    if(task.isDraft) return;
    let isToday = false;
    let isBirthdayTask = false;

    if(task.type === "birthday" && task.date && task.date.slice(5) === todayStr.slice(5)){
      isToday = true; isBirthdayTask = true; birthdayNames.push(task.title);
    } 
    else if(task.type === "daily") isToday = true;
    else if(task.type === "weekly"){
      if(task.everyday) isToday = true;
      else if(Array.isArray(task.weekdays) && task.weekdays.includes(wd)) isToday = true;
    } 
    else if(task.type === "once" && task.date === todayStr) isToday = true;
    else if(task.type === "deadline_weekly" || task.type === "deadline_once"){ isToday = true; }

    if(!isToday && !task.isDone) return;

    if(task.isDone && !isBirthdayTask){
      hiddenList.appendChild(createTaskCard(task, true));
    } else if(isToday){
      taskList.appendChild(createTaskCard(task, false, isBirthdayTask, now));
    }
  });

  if(birthdayNames.length > 0){
    document.body.classList.add("birthday-mode");
    birthdayBanner.style.display = "block";
    const names = birthdayNames.map(n => escapeHtml(n)).join(" & ");
    birthdayBanner.innerHTML = `🎉 今日は ${names} の誕生日です！おめでとう！ 🎂`;
  } else {
    document.body.classList.remove("birthday-mode");
    birthdayBanner.style.display = "none";
  }

  const hiddenArea = document.getElementById("hiddenArea");
  const toggleBtn = document.getElementById("toggleHidden");
  if(getComputedStyle(hiddenArea).display !== "none"){
    toggleBtn.textContent = "非表示を閉じる";
  } else { toggleBtn.textContent = "- 完了したタスクを表示 -"; }

  document.querySelectorAll('.undoBtn').forEach(btn => btn.addEventListener('click', () => undoTask(Number(btn.dataset.id))));
  document.querySelectorAll('.chkTask').forEach(cb => cb.addEventListener('click', () => checkTask(Number(cb.dataset.id))));
}

function createTaskCard(task, hidden=false, isBirthday=false, now=null){
  const div = document.createElement("div");
  div.className = "task-card" + (hidden ? " hidden-task" : "") + (isBirthday ? " birthday-task" : "");
  
  const top = document.createElement("div"); top.className = "task-top";
  const left = document.createElement("div"); left.style.display="flex"; left.style.alignItems="center"; left.style.gap="10px";

  if(isBirthday){
    left.innerHTML = `<div style="font-size:26px;">🎂</div><div class="task-title" style="color:#db2777;">${escapeHtml(task.title)}</div>`;
  } else if(!hidden){
    const chk = document.createElement("input"); chk.type="checkbox"; chk.className="chkTask"; chk.dataset.id = task.id; left.appendChild(chk);
    const title = document.createElement("div"); title.className="task-title"; title.innerHTML = escapeHtml(task.title || "(無題)");
    left.appendChild(title);
  } else {
    const doneMark = document.createElement("div"); doneMark.textContent="✓"; doneMark.style.color="#10b981"; doneMark.style.fontWeight="800"; left.appendChild(doneMark);
    const title = document.createElement("div"); title.className="task-title"; title.innerHTML = escapeHtml(task.title || "(無題)");
    left.appendChild(title);
  }
  top.appendChild(left);

  const meta = document.createElement("div"); meta.className="task-meta";
  
  // 期限タスクの処理
  if(!hidden && (task.type === "deadline_weekly" || task.type === "deadline_once")) {
    const info = getDeadlineInfo(task, now || new Date());
    let metaHTML = "";
    
    if(info.isWarning) {
      div.classList.add("warning-pulse");
      metaHTML += `<div class="warning-badge">⚠️ 期限間近</div><br>`;
    }
    
    let deadlineStr = "";
    if(task.type === "deadline_weekly") deadlineStr = `${weekdayName(task.endWd)}曜 ${task.endTime} まで`;
    else deadlineStr = `${formatMonthDay(task.date)} ${task.endTime || "23:59"} まで`;

    metaHTML += `課題: ${deadlineStr}`;
    if(info.text) metaHTML += `<br><span style="font-size:13px; opacity:0.9">${info.text}</span>`;
    
    meta.innerHTML = metaHTML;
    meta.style.color = info.color;
    meta.style.fontWeight = "bold";
  }
  else if(task.type === "weekly") meta.textContent = task.everyday ? "毎日" : (task.weekdays||[]).map(n=>weekdayName(n)).join("・") + "曜";
  else if(task.type === "once") meta.textContent = formatMonthDay(task.date);
  else if(task.type === "birthday") meta.textContent = "誕生日！";
  else meta.textContent = "毎日";
  top.appendChild(meta);

  const memo = document.createElement("div"); memo.className="task-memo"; memo.textContent = task.memo || "";

  const actions = document.createElement("div"); actions.className="task-actions";
  if(hidden){
    const undo = document.createElement("button"); undo.className="btn"; undo.textContent="戻す"; undo.dataset.id = task.id; undo.classList.add("undoBtn"); actions.appendChild(undo);
  } else {
    const infoBtn = document.createElement("button"); infoBtn.className="btn"; infoBtn.textContent="編集";
    infoBtn.addEventListener('click', ()=> { switchMode("edit"); setTimeout(()=> { const el = document.querySelector(`#editList .edit-row[data-id='${task.id}']`); if(el) el.scrollIntoView({behavior:'smooth', block:'center'}); }, 120); });
    actions.appendChild(infoBtn);
  }

  div.appendChild(top);
  if(task.memo) div.appendChild(memo);
  div.appendChild(actions);
  return div;
}

function checkTask(id){
  const today = todayISO();
  const nowTime = new Date().getTime();
  tasks = tasks.map(t => t.id === id ? {...t, isDone:true, lastDoneDate:today, lastDoneTime: nowTime} : t);
  saveDebounced(); render();
}
function undoTask(id){
  tasks = tasks.map(t => t.id === id ? {...t, isDone:false} : t);
  saveDebounced(); render();
}

function toggleHidden(){
  const area = document.getElementById("hiddenArea");
  const btn = document.getElementById("toggleHidden");
  if(getComputedStyle(area).display !== "none"){ area.style.display = "none"; btn.textContent = "- 完了したタスクを表示 -"; } 
  else { area.style.display = "block"; btn.textContent = "非表示を閉じる"; }
}
document.getElementById("toggleHidden").addEventListener("click", toggleHidden);

/* ---------- 編集モード描画 ---------- */
function renderEdit(){
  const editList = document.getElementById("editList");
  editList.innerHTML = "";

  if(tasks.length === 0){ editList.innerHTML = `<div style="color:var(--muted)">タスクがありません。上の「新規追加」で追加してください。</div>`; return; }

  const dailyTasks = tasks.filter(t => ["daily", "weekly", "once"].includes(t.type) || !t.type);
  const deadlineTasks = tasks.filter(t => ["deadline_weekly", "deadline_once"].includes(t.type));
  const birthdayTasks = tasks.filter(t => t.type === "birthday");

  function createRowElement(task) {
    const row = document.createElement("div"); row.className = "edit-row"; row.dataset.id = task.id;
    const titleInput = document.createElement("input"); titleInput.type="text"; titleInput.value = task.title || ""; titleInput.style.minWidth="160px"; titleInput.placeholder = "タイトル";
    const memoInput = document.createElement("input"); memoInput.type="text"; memoInput.value = task.memo || ""; memoInput.style.minWidth="140px"; memoInput.placeholder = "メモ";
    
    const typeSelect = document.createElement("select");
    typeSelect.innerHTML = `
      <option value="daily">毎日（ルーティン）</option>
      <option value="weekly">曜日指定（その日だけ）</option>
      <option value="once">日付指定（その日だけ）</option>
      <option value="deadline_weekly">課題（曜日・時間で復活・期限）</option>
      <option value="deadline_once">課題（指定日時が期限）</option>
      <option value="birthday">誕生日（毎年お祝い）</option>
    `;
    typeSelect.value = task.type || "daily";

    // 従来の曜日選択
    const wkBox = document.createElement("div"); wkBox.style.display="flex"; wkBox.style.gap="6px"; wkBox.style.alignItems="center";
    for(let i=0;i<7;i++){
      const lab = document.createElement("label");
      const cb = document.createElement("input"); cb.type="checkbox"; cb.value = i; cb.className = "wk-edit";
      cb.checked = Array.isArray(task.weekdays) && task.weekdays.includes(i);
      lab.appendChild(cb); lab.appendChild(document.createTextNode(weekdayName(i)));
      wkBox.appendChild(lab);
    }

    // 新しい詳細な時間設定ボックス
    const advTimeBox = document.createElement("div"); advTimeBox.className = "adv-time-box";
    const getWdOptions = (selVal) => [0,1,2,3,4,5,6].map(i => `<option value="${i}" ${selVal==i?'selected':''}>${weekdayName(i)}曜</option>`).join('');
    
    advTimeBox.innerHTML = `
      <div class="deadline-weekly-inputs" style="display:flex; gap:10px; align-items:center;">
        <div>復活: <select class="start-wd">${getWdOptions(task.startWd || 1)}</select> <input type="time" class="start-time" value="${task.startTime || '08:00'}"></div>
        <div>期限: <select class="end-wd">${getWdOptions(task.endWd || 5)}</select> <input type="time" class="end-time" value="${task.endTime || '23:59'}"></div>
      </div>
      <div class="deadline-once-inputs" style="display:flex; gap:10px; align-items:center;">
        <div>期限: <input type="date" class="date-input" value="${task.date || ''}"> <input type="time" class="once-time" value="${task.endTime || '23:59'}"></div>
      </div>
      <div class="regular-date-input">
        <input type="date" class="reg-date" value="${task.date || ''}">
      </div>
    `;

    const exampleSpan = document.createElement("div"); exampleSpan.className = "example";
    
    function updateVisibility(){
      const t = typeSelect.value;
      wkBox.style.display = t === "weekly" ? "" : "none";
      
      const dwInputs = advTimeBox.querySelector('.deadline-weekly-inputs');
      const doInputs = advTimeBox.querySelector('.deadline-once-inputs');
      const regInputs = advTimeBox.querySelector('.regular-date-input');
      
      dwInputs.style.display = "none";
      doInputs.style.display = "none";
      regInputs.style.display = "none";
      advTimeBox.style.display = "none";

      if(t === "deadline_weekly") { advTimeBox.style.display = ""; dwInputs.style.display = "flex"; }
      else if(t === "deadline_once") { advTimeBox.style.display = ""; doInputs.style.display = "flex"; }
      else if(t === "once" || t === "birthday") { advTimeBox.style.display = ""; regInputs.style.display = "block"; }
      
      updateExample();
    }

    function updateExample(){
      const t = typeSelect.value;
      if(t === "weekly"){
        const sel = []; wkBox.querySelectorAll(".wk-edit").forEach(cb => { if(cb.checked) sel.push(weekdayName(Number(cb.value))); });
        exampleSpan.textContent = `例: ${sel.length > 0 ? sel.join("・")+"曜" : "未選択"}のみ表示`;
      } else if(t === "deadline_weekly"){
        const sWd = advTimeBox.querySelector('.start-wd option:checked').text;
        const sTime = advTimeBox.querySelector('.start-time').value;
        const eWd = advTimeBox.querySelector('.end-wd option:checked').text;
        const eTime = advTimeBox.querySelector('.end-time').value;
        exampleSpan.textContent = `例: ${sWd}${sTime}に未完了に戻り、${eWd}${eTime}まで表示`;
      } else if(t === "deadline_once"){
        const dStr = formatMonthDay(advTimeBox.querySelector('.date-input').value) || "未設定";
        const time = advTimeBox.querySelector('.once-time').value;
        exampleSpan.textContent = `例: ${dStr}の${time}まで終わるまで表示`;
      } else if(t === "once"){
        const dStr = formatMonthDay(advTimeBox.querySelector('.reg-date').value) || "未設定";
        exampleSpan.textContent = `例: ${dStr}のみ表示`;
      } else if(t === "birthday"){
        const dStr = formatMonthDay(advTimeBox.querySelector('.reg-date').value) || "未設定";
        exampleSpan.textContent = `例: 毎年 ${dStr} に特別表示`;
      } else { exampleSpan.textContent = `例: 毎日表示`; }
    }

    const infoSpan = document.createElement("div"); infoSpan.style.color="#6b7280"; infoSpan.style.fontSize="13px";
    infoSpan.textContent = task.isDraft ? "下書き" : (task.isDone ? `完了 (${task.lastDoneDate||""})` : "未完了");

    const actions = document.createElement("div"); actions.className = "edit-actions";
    const deleteBtn = document.createElement("button"); deleteBtn.textContent = "削除"; deleteBtn.className="btn danger";
    actions.appendChild(deleteBtn);

    row.appendChild(titleInput); row.appendChild(memoInput); row.appendChild(typeSelect);
    row.appendChild(wkBox); row.appendChild(advTimeBox); row.appendChild(exampleSpan); row.appendChild(infoSpan); row.appendChild(actions);

    updateVisibility();
    typeSelect.addEventListener("change", updateVisibility);
    wkBox.querySelectorAll(".wk-edit").forEach(cb => cb.addEventListener("change", updateExample));
    advTimeBox.querySelectorAll("select, input").forEach(el => el.addEventListener("change", updateExample));
    titleInput.addEventListener("input", updateExample);

    let localTimer = null;
    function autoSave(){
      if(localTimer) clearTimeout(localTimer);
      localTimer = setTimeout(() => {
        const id = Number(row.dataset.id);
        const idx = tasks.findIndex(t => t.id === id);
        if(idx === -1) return;
        const newTitle = titleInput.value.trim();
        const newWeekdays = [];
        wkBox.querySelectorAll(".wk-edit").forEach(cb => { if(cb.checked) newWeekdays.push(Number(cb.value)); });

        const tType = typeSelect.value;
        let dateVal = "", startWd = 1, startTime = "08:00", endWd = 5, endTime = "23:59";
        
        if (tType === "deadline_weekly") {
          startWd = Number(advTimeBox.querySelector('.start-wd').value);
          startTime = advTimeBox.querySelector('.start-time').value;
          endWd = Number(advTimeBox.querySelector('.end-wd').value);
          endTime = advTimeBox.querySelector('.end-time').value;
        } else if (tType === "deadline_once") {
          dateVal = advTimeBox.querySelector('.date-input').value;
          endTime = advTimeBox.querySelector('.once-time').value;
        } else {
          dateVal = advTimeBox.querySelector('.reg-date').value;
        }

        tasks[idx] = {
          ...tasks[idx], title: newTitle, memo: memoInput.value.trim(),
          type: tType, date: dateVal, weekdays: newWeekdays,
          startWd, startTime, endWd, endTime,
          isDraft: (tasks[idx].isDraft && newTitle !== "") ? false : tasks[idx].isDraft
        };
        saveDebounced();
        infoSpan.textContent = tasks[idx].isDraft ? "下書き" : (tasks[idx].isDone ? `完了 (${tasks[idx].lastDoneDate||""})` : "未完了");
      }, SAVE_DEBOUNCE_MS);
    }
    
    [titleInput, memoInput, typeSelect, ...wkBox.querySelectorAll(".wk-edit"), ...advTimeBox.querySelectorAll("input, select")].forEach(el => {
      el.addEventListener("input", autoSave); el.addEventListener("change", autoSave);
    });

    deleteBtn.addEventListener("click", () => {
      if(!confirm("このタスクを削除しますか？")) return;
      tasks = tasks.filter(t => t.id !== Number(row.dataset.id));
      saveDebounced(); renderEdit();
    });
    return row;
  }

  if(dailyTasks.length > 0) {
    const h = document.createElement("div"); h.className = "edit-group-title"; h.textContent = "📅 日常のタスク"; editList.appendChild(h);
    dailyTasks.forEach(t => editList.appendChild(createRowElement(t)));
  }
  if(deadlineTasks.length > 0) {
    const h = document.createElement("div"); h.className = "edit-group-title"; h.textContent = "🔥 課題・宿題"; editList.appendChild(h);
    deadlineTasks.forEach(t => editList.appendChild(createRowElement(t)));
  }
  if(birthdayTasks.length > 0) {
    const h = document.createElement("div"); h.className = "edit-group-title"; h.textContent = "🎂 誕生日"; editList.appendChild(h);
    birthdayTasks.forEach(t => editList.appendChild(createRowElement(t)));
  }
}

document.getElementById("newDraftBtn").addEventListener("click", () => {
  const draft = { id: Date.now(), title: "", memo: "", type: "daily", weekdays: [], everyday: false, date: "", isDone: false, lastDoneDate: "", isDraft: true };
  tasks.unshift(draft); saveDebounced(); switchMode("edit");
  setTimeout(()=> {
    renderEdit(); const el = document.querySelector(`#editList .edit-row[data-id='${draft.id}']`);
    if(el){ el.scrollIntoView({behavior:'smooth', block:'center'}); const input = el.querySelector('input[type="text"]'); if(input) input.focus(); }
  }, 80);
});

document.getElementById("deleteAll").addEventListener("click", () => {
  if(!confirm("本当に全てのタスクを削除しますか？")) return;
  tasks = []; saveDebounced(); renderEdit();
});

// データを文字にしてクリップボードにコピー
document.getElementById("exportBtn").addEventListener("click", () => {
  const dataStr = JSON.stringify(tasks);
  navigator.clipboard.writeText(dataStr).then(() => {
    alert("タスクデータをコピーしました！データを使いたい端末にメール等で送って貼り付けてください。");
  }).catch(() => {
    alert("コピーに失敗しました。データ: " + dataStr);
  });
});

// スマホ側で文字を貼り付けて復元
document.getElementById("importBtn").addEventListener("click", () => {
  const dataStr = prompt("コピーしたデータをここに貼り付けてください：");
  if(!dataStr) return;
  try {
    const imported = JSON.parse(dataStr);
    if(Array.isArray(imported)) {
      tasks = imported;
      saveDebounced();
      if(currentMode === "edit") renderEdit(); else render();
      alert("読み込みが完了しました！");
    } else { alert("データの形式が正しくありません。"); }
  } catch(e) { alert("データの読み込みに失敗しました。"); }
});

switchMode("display");
</script>
</body>
</html>
