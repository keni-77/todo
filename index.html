<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Note ToDo</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="animation-splash" style="
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: #1e293b; color: #ffffff; z-index: 99999;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    transition: opacity 0.5s ease, visibility 0.5s;
  ">
    <div id="splash-logo" style="font-size: 28px; font-weight: 900; letter-spacing: 2px; animation: pulse 1.2s infinite alternate;">
      🔥 神 TODO LIST LOADING...
    </div>
  </div>
  <style>
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.5; }
      100% { transform: scale(1.05); opacity: 1; }
    }
  </style>
  <div class="app">
    <header class="app-header">
      <h1>やることリスト</h1>
      <div id="internationalDay" class="intl-day" style="display:none;"></div>
      <div class="header-sub">説明は薄く表示。編集は専用モードで行います。</div>
    </header>

    <div id="birthdayBanner" class="birthday-banner" style="display:none;"></div>

    <nav class="tabs">
      <button id="displayTab" class="tab active">表示モード</button>
      <button id="editTab" class="tab">編集モード</button>
    </nav>

    <main id="displayArea" class="area">
      <section class="card">
        <div class="tools-row">
          <div class="today-info">今日: <span id="todayLabel"></span></div>
        </div>
        <h2 class="section-title">今日のタスク・課題</h2>
        <div id="taskList" class="list-grid"></div>
        <div class="hidden-toggle" style="margin-top: 16px;">
          <button id="toggleHidden" class="btn">- 完了したタスクを表示 -</button>
        </div>
        <div id="hiddenArea" class="hidden-area" style="display:none;">
          <h3 style="margin-top:0;">完了したタスク</h3>
          <div id="hiddenList" class="list-grid"></div>
        </div>
      </section>
    </main>

    <main id="editArea" class="area" style="display:none;">
      <section class="card edit-card">
        <div class="edit-tools" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom: 16px;">
          <button id="newDraftBtn" class="btn primary">新規追加（下書き）</button>
          <button id="deleteAll" class="btn danger">全削除</button>
          <button id="exportBtn" class="btn">データをコピー</button>
          <button id="importBtn" class="btn">データを読み込み</button>
        </div>
        
        <h2 class="section-title">全タスク・課題（編集）</h2>
        <div id="editList" class="edit-list"></div>
      </section>
    </main>

    <footer class="app-footer">
      <small>localStorage に安全に保存中。消えません。</small>
    </footer>
  </div>

  <script href="app.js" src="app.js"></script>
</body>
</html>
